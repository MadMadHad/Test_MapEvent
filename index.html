<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Test Map Event</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="map"></div>

  <!-- FULL CALENDAR UI -->
  <div id="datePickerContainer">

    <div id="dayDecrement" class="sideButton">−</div>

    <div class="boxGroup">

      <div class="col">
        <div id="yearUp" class="arrowTop"></div>
        <div id="yearDisplay" class="valueBox">2026</div>
        <div id="yearDown" class="arrowBottom"></div>
      </div>

      <div class="col">
        <div id="monthUp" class="arrowTop"></div>
        <div id="monthDisplay" class="valueBox">04</div>
        <div id="monthDown" class="arrowBottom"></div>
      </div>

      <div class="col">
        <div id="dayUp" class="arrowTop"></div>
        <div id="dayDisplay" class="valueBox">20</div>
        <div id="dayDown" class="arrowBottom"></div>
      </div>

    </div>

    <div id="dayIncrement" class="sideButton">+</div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>
</html>
